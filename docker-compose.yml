services:
  postgres:
    image: postgres:16-alpine
    container_name: smartagenda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smartagenda
      POSTGRES_USER: smartagenda
      POSTGRES_PASSWORD: smartagenda
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smartagenda-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3333:3333"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: smartagenda-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
