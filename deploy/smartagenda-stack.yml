version: "3.7"

services:
  api:
    image: smartagenda-api:latest
    networks:
      - network_public
    environment:
      API_PORT: "3333"
      NEXT_PUBLIC_APP_URL: https://www.agendasmart.com.br
      EVOLUTION_API_URL: https://evolutionapi.agendasmart.com.br
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-smartagenda_teste}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: https://api.agendasmart.com.br/integrations/google/callback
      GOOGLE_SCOPES: https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.freebusy
      GOOGLE_AVAILABILITY_DAYS: ${GOOGLE_AVAILABILITY_DAYS:-14}
      WORK_START_HOUR: ${WORK_START_HOUR:-9}
      WORK_END_HOUR: ${WORK_END_HOUR:-18}
      SLOT_STEP_MINUTES: ${SLOT_STEP_MINUTES:-60}
      MAX_AVAILABILITY_SLOTS: ${MAX_AVAILABILITY_SLOTS:-6}
      JWT_SECRET: ${JWT_SECRET:-change-me-before-production}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.smartagenda_api.rule=Host(`api.agendasmart.com.br`)
        - traefik.http.routers.smartagenda_api.entrypoints=websecure
        - traefik.http.routers.smartagenda_api.tls=true
        - traefik.http.routers.smartagenda_api.tls.certresolver=letsencryptresolver
        - traefik.http.routers.smartagenda_api.service=smartagenda_api
        - traefik.http.services.smartagenda_api.loadbalancer.server.port=3333
        - traefik.http.services.smartagenda_api.loadbalancer.passhostheader=true

  web:
    image: smartagenda-web:latest
    networks:
      - network_public
    environment:
      NEXT_PUBLIC_APP_URL: https://www.agendasmart.com.br
      NEXT_PUBLIC_API_URL: https://api.agendasmart.com.br
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_public
        - traefik.http.routers.smartagenda_web.rule=Host(`www.agendasmart.com.br`)
        - traefik.http.routers.smartagenda_web.entrypoints=websecure
        - traefik.http.routers.smartagenda_web.tls=true
        - traefik.http.routers.smartagenda_web.tls.certresolver=letsencryptresolver
        - traefik.http.routers.smartagenda_web.service=smartagenda_web
        - traefik.http.services.smartagenda_web.loadbalancer.server.port=3000
        - traefik.http.services.smartagenda_web.loadbalancer.passhostheader=true

networks:
  network_public:
    external: true
    name: network_public
